services:
  # Apache AGE Graph Database (PostgreSQL + AGE + pgvector)
  age-postgres:
    build:
      context: .
      dockerfile: docker/age-pgvector.Dockerfile
    container_name: electomate-age
    restart: unless-stopped
    environment:
      POSTGRES_DB: age_graph
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - age_postgres_data:/var/lib/postgresql
    ports:
      - "5433:5432"
    networks:
      - electomate-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d age_graph"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL Database
  postgres:
    image: postgres:17-alpine
    container_name: electomate-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: em_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - electomate-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d em_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ElectOMate Backend Application
  app:
    container_name: electomate-backend
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PRELOAD_DOCLING_MODELS: "false"
    command: [ "fastapi", "dev", "--host", "0.0.0.0", "--port", "8000", "/app/src/em_backend/main.py" ]
    environment:
      # Database Configuration
      POSTGRES_URL: ${POSTGRES_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/em_dev}


      PERPLEXITY_API_KEY: ${PERPLEXITY_API_KEY}
      PERPLEXITY_MODEL: ${PERPLEXITY_MODEL}

      # Weaviate Configuration (from .env)
      WV_URL: ${WV_URL}
      WV_API_KEY: ${WV_API_KEY}


      # OpenAI Configuration (from .env)
      OPENAI_API_KEY: ${OPENAI_API_KEY}

      # Graph Database (AGE)
      AGE_POSTGRES_URL: "host=age-postgres port=5432 dbname=age_graph user=postgres password=postgres"

      # Google Gemini API
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}

      # Hungarian Parliament API
      PARLIAMENT_HU_API_TOKEN: ${PARLIAMENT_HU_API_TOKEN:-}

      # Application Environment
      ENV: ${ENV:-dev}
      LOG_LEVEL: DEBUG
    ports:
      - "8000:8000"
    networks:
      - electomate-network
    volumes:
      - ./alembic/versions:/app/alembic/versions
      - ./.cache/docling/models:/home/app/.cache/docling/models
      - ./Quiz_Results_Folder:/app/Quiz_Results_Folder
      - ./Questionaire_Results_Folder:/app/Questionaire_Results_Folder
    develop:
      watch:
        - action: sync
          path: .
          target: /app
          ignore:
            - ./alembic/versions/
            - ./Quiz_Results_Folder/
            - ./Questionaire_Results_Folder/
        - action: rebuild
          path: ./pyproject.toml
    depends_on:
      postgres:
        condition: service_healthy
      age-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# Networks
networks:
  electomate-network:
    driver: bridge
    name: electomate-network

# Volumes
volumes:
  postgres_data:
    driver: local
    name: electomate-postgres-data
  age_postgres_data:
    driver: local
    name: electomate-age-data